[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
cmds = [
  "npm install -g pnpm@10 --quiet",
  "pnpm install --filter @manuscry/shared --filter @manuscry/api"
]

[phases.build]
cmds = [
  "pnpm --filter @manuscry/shared build",
  "pnpm --filter @manuscry/api build"
]

[start]
cmd = "node apps/api/dist/index.js"
